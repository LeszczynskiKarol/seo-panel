<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <line x1="80" y1="380" x2="432" y2="380" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="80" y1="300" x2="432" y2="300" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="80" y1="220" x2="432" y2="220" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="80" y1="140" x2="432" y2="140" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- Bar 1 - blue (shortest) -->
  <rect x="108" y="260" width="72" height="120" rx="8" fill="url(#bar1)" opacity="0.95"/>
  <!-- Bar 2 - green (tallest) -->
  <rect x="220" y="130" width="72" height="250" rx="8" fill="url(#bar2)" opacity="0.95"/>
  <!-- Bar 3 - purple (medium) -->
  <rect x="332" y="190" width="72" height="190" rx="8" fill="url(#bar3)" opacity="0.95"/>
  <!-- Trend line connecting bar tops -->
  <polyline points="144,250 256,120 368,180" fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Dots on trend line -->
  <circle cx="144" cy="250" r="7" fill="#3b82f6" stroke="#0f1729" stroke-width="3"/>
  <circle cx="256" cy="120" r="7" fill="#22c55e" stroke="#0f1729" stroke-width="3"/>
  <circle cx="368" cy="180" r="7" fill="#a855f7" stroke="#0f1729" stroke-width="3"/>
  <!-- Small "SEO" text at bottom -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="56" fill="#475569" letter-spacing="12">SEO</text>
</svg>
