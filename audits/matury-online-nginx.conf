# /etc/nginx/sites-available/matury-online
# Edited 2026-05-25: added gzip, HSTS, security headers, Cache-Control on HTML;
# moved CORS headers from server-level (where they bled onto HTML responses)
# into location /api only.

# HTTP → HTTPS (zawsze na www)
server {
    if ($host = www.matury-online.pl) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = matury-online.pl) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name matury-online.pl www.matury-online.pl;
    return 301 https://www.matury-online.pl$request_uri;
}

# HTTPS bez www → www
server {
    listen 443 ssl;
    server_name matury-online.pl;
    ssl_certificate /etc/letsencrypt/live/matury-online.pl/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/matury-online.pl/privkey.pem; # managed by Certbot

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    return 301 https://www.matury-online.pl$request_uri;
}

# GŁÓWNY SERWER
server {
    listen 443 ssl;
    server_name www.matury-online.pl;
    ssl_certificate /etc/letsencrypt/live/matury-online.pl/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/matury-online.pl/privkey.pem; # managed by Certbot

    # ── Compression ──
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
      text/plain
      text/css
      text/xml
      application/javascript
      application/json
      application/xml
      application/xml+rss
      application/atom+xml
      image/svg+xml
      font/ttf
      font/otf;

    # ── HTML / SSR pages (Astro on :4321) ──
    location / {
        proxy_pass http://localhost:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security headers (must be repeated here because /api adds CORS,
        # and `add_header` in a child location replaces inherited headers)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Brief browser/CDN cache, allows stale-while-revalidate behavior
        add_header Cache-Control "public, max-age=300, stale-while-revalidate=86400" always;
    }

    # ── /api → backend with CORS ──
    location /api {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;

        # CORS (was previously at server level — leaked onto HTML responses)
        set $cors_origin "";
        if ($http_origin) {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With, Cookie" always;

        # Repeat security headers (CORS add_header here resets inheritance)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}
