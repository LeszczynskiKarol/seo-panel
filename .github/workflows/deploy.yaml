name: Deploy SEO Panel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get runner IP
        id: ip
        run: |
          PUBLIC_IP=$(curl -s --retry 3 --retry-delay 2 https://api.ipify.org)
          if [[ ! "$PUBLIC_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Failed to get valid public IP: '$PUBLIC_IP'"
            exit 1
          fi
          echo "ipv4=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "Runner IP: $PUBLIC_IP"

      - name: Open SSH
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SEOPANEL_SG_ID }} \
            --protocol tcp --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SEOPANEL_HOST }}
          username: ubuntu
          key: ${{ secrets.SEOPANEL_SSH_KEY }}
          command_timeout: 300s
          script: |
            cd /var/www/seo-panel

            echo "=== Git pull ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Backend ==="
            cd backend
            rm -rf node_modules
            npm install
            npx prisma db push
            npx prisma generate

            echo "=== Frontend ==="
            cd ../frontend
            rm -rf node_modules
            npm install
            npm run build

            echo "=== Restart ==="
            pm2 restart seo-panel
            pm2 save

            sleep 3
            echo "=== Status ==="
            pm2 list
            curl -s http://localhost:5555/api/health

      - name: Close SSH
        if: always()
        run: |
          IP="${{ steps.ip.outputs.ipv4 }}"
          if [[ "$IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            aws ec2 revoke-security-group-ingress \
              --group-id ${{ secrets.SEOPANEL_SG_ID }} \
              --protocol tcp --port 22 \
              --cidr ${IP}/32 || true
          else
            echo "No valid IP to revoke, skipping"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
